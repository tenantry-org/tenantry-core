name: Release

on:
  push:
    tags:
      - 'v*'  # Trigger on tags like v0.1.0-alpha, v1.0.0, etc.

permissions:
  contents: read   # default least privilege; publish job opts into more below

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false   # never cancel a half-done publish

jobs:
  # Run the exact same gates as CI (Sonar quality gate, coverage gate, AOT publish)
  # against the tagged commit. Publishing is blocked unless this succeeds.
  ci:
    uses: ./.github/workflows/build-test.yml
    secrets: inherit

  publish:
    name: Pack & Publish to NuGet
    runs-on: ubuntu-latest
    needs: ci
    environment: release   # manual-approval gate + OIDC scoped to this environment (see repo settings)
    permissions:
      id-token: write  # enable GitHub OIDC token issuance for this job
      contents: write  # needed for creating releases; also allows the action to read the repo for changelog generation

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0   # MinVer needs full history for version calculation

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Restore
        run: dotnet restore Tenantry.slnx

      - name: Build
        run: dotnet build Tenantry.slnx -c Release --no-restore

      - name: Pack
        run: |
          dotnet pack src/Tenantry.Core          -c Release --no-build -o ./artifacts
          dotnet pack src/Tenantry.AspNetCore    -c Release --no-build -o ./artifacts
          dotnet pack src/Tenantry.EfCore        -c Release --no-build -o ./artifacts

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: nuget-packages
          path: ./artifacts/*.nupkg

      - name: NuGet login (OIDC → temp API key)
        uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841 # v1.2.0
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to NuGet
        run: dotnet nuget push ./artifacts/*.nupkg --api-key ${{ steps.login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          files: ./artifacts/*.nupkg
          generate_release_notes: true
