name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true   # superseded PR pushes can be cancelled

jobs:
  build-and-test:
    uses: ./.github/workflows/build-test.yml
    secrets: inherit

  pack:
    name: Pack NuGet
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/master'

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup .NET (8, 9, 10)
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Restore
        run: dotnet restore Tenantry.slnx

      - name: Pack
        run: |
          dotnet pack src/Tenantry.Core          -c Release --no-restore -o ./artifacts
          dotnet pack src/Tenantry.EfCore        -c Release --no-restore -o ./artifacts
          dotnet pack src/Tenantry.AspNetCore    -c Release --no-restore -o ./artifacts

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: nuget-packages
          path: ./artifacts/*.nupkg
