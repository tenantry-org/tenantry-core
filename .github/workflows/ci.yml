name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # MinVer needs full history for version calculation

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Restore
        run: dotnet restore Tenantry.slnx

      - name: Build
        run: dotnet build Tenantry.slnx -c Release --no-restore

      - name: Test (all)
        run: dotnet test Tenantry.slnx -c Release --no-build --logger "console;verbosity=minimal"

      - name: Verify AOT publish
        run: dotnet publish samples/Tenantry.Samples.Aot -c Release

  pack:
    name: Pack NuGet
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/master'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET (8, 9, 10)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Restore
        run: dotnet restore Tenantry.slnx

      - name: Pack
        run: |
          dotnet pack src/Tenantry.Core          -c Release --no-restore -o ./artifacts
          dotnet pack src/Tenantry.EfCore        -c Release --no-restore -o ./artifacts
          dotnet pack src/Tenantry.AspNetCore    -c Release --no-restore -o ./artifacts

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: ./artifacts/*.nupkg
